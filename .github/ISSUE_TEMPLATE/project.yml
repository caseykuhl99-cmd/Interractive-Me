
name: "Opportunity Template"
description: "Template for opportunity issues"
title: "[Opportunity] Opportunity title"
labels: ["opportunity", "project"]
assignees:
  - HP6NTKB_deere
  - fl40274_deere
body:
  - type: markdown
    attributes:
      value: |
        Please fill in the fields below:

  - type: input
    id: opportunity_statement
    attributes:
      label: "Opportunity Statement"
      description: "Describe the opportunity"
      placeholder: "e.g., Improve process X"
    validations:
      required: true

  - type: textarea
    id: deliverable
    attributes:
      label: "Deliverable"
      description: "What is the deliverable?"
      placeholder: "e.g., Dashboard, report..."
    validations:
      required: true

  - type: input
    id: hours_unlocked
    attributes:
      label: "Hours Unlocked per Year"
      description: "How many hours will be unlocked per year?"
      placeholder: "e.g., 120"
    validations:
      required: true

  - type: textarea
    id: reasoning
    attributes:
      label: "Reasoning"
      description: "Explain the reasoning behind this opportunity"
      placeholder: "Why is this opportunity important?"
    validations:
      required: true

  - type: input
    id: focus_group
    attributes:
      label: "Focus Group"
      description: "Which team or group will focus on this opportunity?"
      placeholder: "e.g., Data team"
    validations:
      required: false

  - type: textarea
    id: stakeholders
    attributes:
      label: "Project Stakeholders"
      description: "Who are the stakeholders?"
      placeholder: "e.g., Name1, Name2"
    validations:
      required: false
