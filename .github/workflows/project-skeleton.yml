
name: Create Project Issue Structure

on:
  issues:
    types: [opened]

env:
  # Optional: Set this to your GitHub Project (V2) number if you want to link issues to a project board
  # Leave empty or unset to skip project board integration
  GITHUB_PROJECT_NUMBER: ""

permissions:
  issues: write
  contents: read

jobs:
  build-structure:
    if: contains(toJson(github.event.issue.labels.*.name), 'project')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install GitHub CLI
        run: |
          type -p gh > /dev/null || {
            (type -p curl >/dev/null 2>&1 || (sudo apt update && sudo apt-get install curl -y)) && \
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg && \
            sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg && \
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null && \
            sudo apt update && \
            sudo apt install gh -y
          }

      - name: Create labels if they don't exist
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          
          # Create project label if it doesn't exist
          gh label create "project" --color "0E8A16" --description "Project issue" --repo "$REPO" --force || true
          
          # Create phase label if it doesn't exist
          gh label create "phase" --color "0052CC" --description "Phase issue" --repo "$REPO" --force || true
          
          # Create task label if it doesn't exist
          gh label create "task" --color "1D76DB" --description "Task issue" --repo "$REPO" --force || true

      - name: Define default phases and tasks
        id: prep
        run: |
          REPO="${{ github.repository }}"
          PROJECT_NUMBER="${{ github.event.issue.number }}"
          
          echo "project_number=$PROJECT_NUMBER" >> $GITHUB_OUTPUT
          
          # Define default phases
          PHASES="P1 - Charter Creation and Project Kickoff
          P2 - Insight Gathering
          P3 - Insight Review
          P4 - Analytics & Integration Project Handoff Meeting
          P5 - Analytics Work
          P6 - Integration Work
          P7 - PoC Design Review (Product and Integration)
          P8 - Analytics Work for Production
          P9 - Integration
          PR - Recognition"
          
          echo "phases<<EOF" >> $GITHUB_OUTPUT
          echo "$PHASES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          echo "repo=$REPO" >> $GITHUB_OUTPUT
          
          # Define tasks per phase (format: PHASE_ID|Task1|Task2|Task3)
          cat > phase_tasks.txt << 'TASKS_EOF'
          P1|P1.1 - Insight: Reach out to idea submitter and document a high level understanding of the project|P1.2 - Insight: Document the charter (Project level task) with the template details|P1.3 - Insight: Set up meeting with I&S team to discuss the project, focusing on building an understanding of the questions that need to be asked during the insight interviews
          P2|P2.1 - Insight: Reach out to focus group, asking them the questions defined on P1|P2.2 - Insight: Document the info into a summary presentation
          P3|P3.1 - Insight: Set up meeting with I&S team to discuss the summary presentation|P3.2 - Insight: Reach out to focus group requesting more info if needed|P3.3 - Insight: Formally present Insight project findings to the focus group
          P4|P4.1 - Insight: Set up meeting with I&S team to present project documentation|P4.2 - Analytics: During the meeting, create the analytics tasks needed to be completed as part of project development|P4.3 - Integration: During the meeting, identify the impacted audience of the product (P9) and creating the integration tasks for P6
          P7|P7.1 - Insight: Set up meeting with I&S team to review the product and align on Integration tasks|P7.2 - Insight: Set up Design Review meeting with the focus group to review the product and align on Integration tasks
          P9|P9.1 - Marketing Materials|P9.2 - Training Class|P9.3 - User Feedback|P9.4 - Measure the Value
          TASKS_EOF
          cat phase_tasks.txt

      - name: Get Project information
        id: project_info
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
        run: |
          REPO_OWNER="$(echo ${{ github.repository }} | cut -d'/' -f1)"
          PROJECT_NUMBER="${{ env.GITHUB_PROJECT_NUMBER }}"
          
          # Skip project integration if PROJECT_NUMBER is not set
          if [ -z "$PROJECT_NUMBER" ]; then
            echo "⚠️  GITHUB_PROJECT_NUMBER not set - skipping project board integration"
            echo "   Issues will be created but not linked to a project board"
            echo "project_id=" >> $GITHUB_OUTPUT
            echo "parent_field_id=" >> $GITHUB_OUTPUT
            echo "skip_project=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "Looking for project #$PROJECT_NUMBER for owner: $REPO_OWNER"
          
          # Try organization first (most common case)
          PROJECT_DATA=$(gh api graphql -f query='
            query($owner: String!, $number: Int!) {
              organization(login: $owner) {
                projectV2(number: $number) {
                  id
                  fields(first: 20) {
                    nodes {
                      ... on ProjectV2FieldCommon {
                        id
                        name
                      }
                    }
                  }
                }
              }
            }' -f owner="$REPO_OWNER" -F number="$PROJECT_NUMBER" 2>/dev/null || echo '{"data":{"organization":null}}')
          
          # Get project ID from organization
          PROJECT_ID=$(echo "$PROJECT_DATA" | jq -r '.data.organization.projectV2.id // empty')
          
          # If not found in organization, try user
          if [ -z "$PROJECT_ID" ] || [ "$PROJECT_ID" = "null" ]; then
            echo "Not found in organization, trying user..."
            PROJECT_DATA=$(gh api graphql -f query='
              query($owner: String!, $number: Int!) {
                user(login: $owner) {
                  projectV2(number: $number) {
                    id
                    fields(first: 20) {
                      nodes {
                        ... on ProjectV2FieldCommon {
                          id
                          name
                        }
                      }
                    }
                  }
                }
              }' -f owner="$REPO_OWNER" -F number="$PROJECT_NUMBER" 2>/dev/null || echo '{"data":{"user":null}}')
            
            PROJECT_ID=$(echo "$PROJECT_DATA" | jq -r '.data.user.projectV2.id // empty')
          fi
          
          if [ -z "$PROJECT_ID" ] || [ "$PROJECT_ID" = "null" ]; then
            echo "⚠️  Warning: Could not find project #$PROJECT_NUMBER for $REPO_OWNER"
            echo "   Issues will be created but not linked to project board"
            echo "   Make sure the project exists and PROJECT_TOKEN has access to it"
            echo "project_id=" >> $GITHUB_OUTPUT
            echo "parent_field_id=" >> $GITHUB_OUTPUT
            echo "skip_project=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Get the Parent field ID (look for "Parent issue" or "Parent")
          PARENT_FIELD_ID=$(echo "$PROJECT_DATA" | jq -r '(.data.organization.projectV2.fields.nodes // .data.user.projectV2.fields.nodes) | .[] | select(.name == "Parent issue" or .name == "Parent") | .id')
          
          echo "project_id=$PROJECT_ID" >> $GITHUB_OUTPUT
          echo "parent_field_id=$PARENT_FIELD_ID" >> $GITHUB_OUTPUT
          echo "Project ID: $PROJECT_ID"
          echo "Parent Field ID: $PARENT_FIELD_ID"
          
          # Debug: Show all available fields
          echo "Available project fields:"
          echo "$PROJECT_DATA" | jq -r '(.data.organization.projectV2.fields.nodes // .data.user.projectV2.fields.nodes) | .[] | "  - \(.name) (ID: \(.id))"'
          
          if [ -z "$PARENT_FIELD_ID" ] || [ "$PARENT_FIELD_ID" = "null" ]; then
            echo ""
            echo "⚠️  WARNING: No 'Parent issue' or 'Parent' field found in Project #604"
            echo "   Parent-child relationships will NOT be created in the project"
            echo "   To add a Parent field:"
            echo "   1. Go to Project #604"
            echo "   2. Add a new field"
            echo "   3. Name it 'Parent issue' (type: Issue)"
            echo "   4. This will enable parent-child relationships"
            echo ""
          fi

      - name: Create Phase issues
        id: create_phases
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
        run: |
          REPO="${{ steps.prep.outputs.repo }}"
          PARENT="${{ steps.prep.outputs.project_number }}"
          PROJECT_ID="${{ steps.project_info.outputs.project_id }}"
          PARENT_FIELD_ID="${{ steps.project_info.outputs.parent_field_id }}"
          SKIP_PROJECT="${{ steps.project_info.outputs.skip_project }}"
          
          echo "Creating phase issues for parent #$PARENT"
          # Initialize empty phases_map.txt (no content, not even empty line)
          : > phases_map.txt
          
          # Get parent issue node ID
          PARENT_NODE_ID=$(gh api repos/$REPO/issues/$PARENT --jq .node_id)
          echo "Parent Node ID: $PARENT_NODE_ID"
          
          # Skip project operations if project integration is disabled
          if [ "$SKIP_PROJECT" = "true" ] || [ -z "$PROJECT_ID" ]; then
            echo "⚠️  Skipping project board integration (not configured or unavailable)"
            PARENT_ITEM_ID="skip"
          else
            # Try to add parent to project (may fail if already added or insufficient permissions)
            echo "Adding parent issue #$PARENT to project..."
          PARENT_ITEM_RESULT=$(gh api graphql -f query='
            mutation($projectId: ID!, $contentId: ID!) {
              addProjectV2ItemById(input: {projectId: $projectId, contentId: $contentId}) {
                item { id }
              }
            }' -f projectId="$PROJECT_ID" -f contentId="$PARENT_NODE_ID" 2>&1 || echo '{"data":{"addProjectV2ItemById":{"item":{"id":"existing"}}}}')
          
          PARENT_ITEM_ID=$(echo "$PARENT_ITEM_RESULT" | jq -r '.data.addProjectV2ItemById.item.id // empty')
          
          if [ -z "$PARENT_ITEM_ID" ] || [ "$PARENT_ITEM_ID" = "null" ]; then
            echo "Warning: Could not add parent to project. It may already exist or you may lack permissions."
            echo "Attempting to find existing item..."
            # Try to find the existing item in the project
            PROJECT_ITEMS=$(gh api graphql -f query='
              query($projectId: ID!) {
                node(id: $projectId) {
                  ... on ProjectV2 {
                    items(first: 100) {
                      nodes {
                        id
                        content {
                          ... on Issue {
                            number
                          }
                        }
                      }
                    }
                  }
                }
              }' -f projectId="$PROJECT_ID" 2>&1 || echo '{"data":null}')
            
            PARENT_ITEM_ID=$(echo "$PROJECT_ITEMS" | jq -r --arg num "$PARENT" '.data.node.items.nodes[] | select(.content.number == ($num | tonumber)) | .id')
            
            if [ -n "$PARENT_ITEM_ID" ] && [ "$PARENT_ITEM_ID" != "null" ]; then
              echo "Found existing parent item in project (Item ID: $PARENT_ITEM_ID)"
            else
              echo "Warning: Could not find or add parent item. Parent relationships may not work."
              PARENT_ITEM_ID="unknown"
            fi
          else
            echo "Added parent issue #$PARENT to project (Item ID: $PARENT_ITEM_ID)"
          fi
          fi
          
          while IFS= read -r PH; do
            if [ -n "$PH" ]; then
              echo "Creating phase: $PH"
              PHASE_URL=$(gh issue create \
                --repo "$REPO" \
                --title "[Phase] $PH" \
                --label "phase" \
                --body "**Parent Project:** #$PARENT"$'\n\n'"### Tasks"$'\n'"This phase includes the following tasks:" 2>&1)
              
              if [[ "$PHASE_URL" == *"http"* ]]; then
                PHASE_NUM=$(echo "$PHASE_URL" | grep -oP '[0-9]+$')
                echo "Created phase #$PHASE_NUM: $PH"
                
                # Small delay to avoid rate limiting
                sleep 0.5
              else
                echo "Error creating phase: $PHASE_URL"
                echo "This may be due to insufficient token permissions"
                echo "Token needs 'repo' scope with write access to issues"
                continue
              fi
              
              # Get phase node ID
              PHASE_NODE_ID=$(gh api repos/$REPO/issues/$PHASE_NUM --jq .node_id)
              
              # Add phase to project (skip if project integration disabled)
              if [ "$SKIP_PROJECT" != "true" ] && [ -n "$PROJECT_ID" ]; then
              # Add phase to project
              PHASE_ITEM_RESULT=$(gh api graphql -f query='
                mutation($projectId: ID!, $contentId: ID!) {
                  addProjectV2ItemById(input: {projectId: $projectId, contentId: $contentId}) {
                    item { id }
                  }
                }' -f projectId="$PROJECT_ID" -f contentId="$PHASE_NODE_ID" 2>&1 || echo '{"data":{"addProjectV2ItemById":{"item":{"id":"error"}}}}')
              PHASE_ITEM_ID=$(echo "$PHASE_ITEM_RESULT" | jq -r '.data.addProjectV2ItemById.item.id // empty')
              
              if [ -z "$PHASE_ITEM_ID" ] || [ "$PHASE_ITEM_ID" = "null" ] || [ "$PHASE_ITEM_ID" = "error" ]; then
                echo "Warning: Could not add phase to project. Skipping parent relationship."
                PHASE_ITEM_ID="unknown"
              fi
              else
                echo "Skipping project board linking (not configured)"
                PHASE_ITEM_ID="skip"
              fi
              
              # Create parent-child relationship using GitHub's sub-issues API
              echo "Creating sub-issue relationship: Phase #$PHASE_NUM -> Project #$PARENT"
              
              # Get the internal ID (not issue number) of the phase issue with retry
              set +e  # Don't exit on error during retry
              PHASE_INTERNAL_ID=""
              for i in {1..5}; do
                PHASE_INTERNAL_ID=$(gh api repos/$REPO/issues/$PHASE_NUM --jq .id 2>/dev/null)
                if [ -n "$PHASE_INTERNAL_ID" ] && [ "$PHASE_INTERNAL_ID" != "null" ]; then
                  echo "Phase internal ID: $PHASE_INTERNAL_ID"
                  break
                fi
                if [ $i -lt 5 ]; then
                  echo "Waiting for issue #$PHASE_NUM to be indexed (attempt $i/5)..."
                  sleep 3
                fi
              done
              set -e  # Re-enable exit on error
              
              if [ -z "$PHASE_INTERNAL_ID" ] || [ "$PHASE_INTERNAL_ID" = "null" ]; then
                echo "⚠️  Could not get internal ID for Phase #$PHASE_NUM after 5 attempts, skipping relationship"
              else
                # Add phase as sub-issue of project using the sub-issues API with internal ID
                set +e
                RESULT=$(gh api \
                  --method POST \
                  -H "Accept: application/vnd.github+json" \
                  -H "X-GitHub-Api-Version: 2026-03-10" \
                  /repos/$REPO/issues/$PARENT/sub_issues \
                  -F "sub_issue_id=$PHASE_INTERNAL_ID" 2>&1)
                if [ $? -eq 0 ]; then
                  echo "✅ Set parent relationship: Phase #$PHASE_NUM -> Project #$PARENT"
                else
                  echo "⚠️  Could not set sub-issue relationship: $RESULT"
                fi
                set -e
              fi
              
              echo "$PH|$PHASE_NUM|$PHASE_ITEM_ID|$PHASE_NODE_ID" >> phases_map.txt
              echo "Created phase #$PHASE_NUM: $PH"
            fi
          done <<< "${{ steps.prep.outputs.phases }}"
          
          echo "phases_map<<EOF" >> $GITHUB_OUTPUT
          cat phases_map.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          cat phases_map.txt

      - name: Create Task issues for each Phase
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
        run: |
          REPO="${{ steps.prep.outputs.repo }}"
          PROJECT_ID="${{ steps.project_info.outputs.project_id }}"
          PARENT_FIELD_ID="${{ steps.project_info.outputs.parent_field_id }}"
          PROJECT_ISSUE="${{ steps.prep.outputs.project_number }}"
          SKIP_PROJECT="${{ steps.project_info.outputs.skip_project }}"
          
          while IFS='|' read -r PH_NAME PH_NUM PH_ITEM_ID PH_NODE_ID; do
            if [ -z "$PH_NAME" ] || [ -z "$PH_NUM" ]; then
              echo "Skipping invalid line: $PH_NAME|$PH_NUM|$PH_ITEM_ID|$PH_NODE_ID"
              continue
            fi
              if [ -n "$PH_NAME" ] && [ -n "$PH_NUM" ]; then
                # Extract phase ID (P1, P2, etc.)
                PHASE_ID=$(echo "$PH_NAME" | grep -oP '^P[0-9]+|^PR')
                
                # Check if this phase has tasks defined
                if grep -q "^$PHASE_ID|" phase_tasks.txt; then
                  echo "Creating tasks for phase #$PH_NUM: $PH_NAME"
                  
                  # Get tasks for this phase
                  PHASE_TASKS=$(grep "^$PHASE_ID|" phase_tasks.txt | cut -d'|' -f2-)
                  
                  # Build tasklist for this phase
                  TASK_LIST=""
                  IFS='|' read -ra TASKS <<< "$PHASE_TASKS"
                  for TK in "${TASKS[@]}"; do
                    if [ -n "$TK" ]; then
                      echo "Creating task: $TK"
                      TASK_URL=$(gh issue create \
                        --repo "$REPO" \
                        --title "[Task] $TK" \
                        --label "task" \
                        --body "**Parent Phase:** #$PH_NUM"$'\n\n'"$TK" 2>&1)
                      
                      if [[ "$TASK_URL" == *"http"* ]]; then
                        # Extract the task number from the URL
                        TASK_NUM=$(echo "$TASK_URL" | grep -oP '[0-9]+$')
                        echo "Created task #$TASK_NUM: $TK"
                        
                        # Small delay to avoid rate limiting
                        sleep 0.5
                      else
                        echo "Error creating task: $TASK_URL"
                        continue
                      fi
                      
                      if [ -n "$TASK_NUM" ]; then
                        # Get task node ID
                        TASK_NODE_ID=$(gh api repos/$REPO/issues/$TASK_NUM --jq .node_id)
                        
                        # Add task to project (skip if project integration disabled)
                        if [ "$SKIP_PROJECT" != "true" ] && [ -n "$PROJECT_ID" ]; then
                        # Add task to project
                        TASK_ITEM_RESULT=$(gh api graphql -f query='
                          mutation($projectId: ID!, $contentId: ID!) {
                            addProjectV2ItemById(input: {projectId: $projectId, contentId: $contentId}) {
                              item { id }
                            }
                          }' -f projectId="$PROJECT_ID" -f contentId="$TASK_NODE_ID" 2>&1 || echo '{"data":{"addProjectV2ItemById":{"item":{"id":"error"}}}}')
                        TASK_ITEM_ID=$(echo "$TASK_ITEM_RESULT" | jq -r '.data.addProjectV2ItemById.item.id // empty')
                        
                        if [ -z "$TASK_ITEM_ID" ] || [ "$TASK_ITEM_ID" = "null" ] || [ "$TASK_ITEM_ID" = "error" ]; then
                          echo "Warning: Could not add task to project. Skipping parent relationship."
                          TASK_ITEM_ID="unknown"
                        fi
                        else
                          echo "Skipping project board linking (not configured)"
                          TASK_ITEM_ID="skip"
                        fi
                        
                        # Create parent-child relationship using GitHub's sub-issues API
                        echo "Creating sub-issue relationship: Task #$TASK_NUM -> Phase #$PH_NUM"
                        
                        # Get the internal ID (not issue number) of the task issue with retry
                        set +e  # Don't exit on error during retry
                        TASK_INTERNAL_ID=""
                        for i in {1..5}; do
                          TASK_INTERNAL_ID=$(gh api repos/$REPO/issues/$TASK_NUM --jq .id 2>/dev/null)
                          if [ -n "$TASK_INTERNAL_ID" ] && [ "$TASK_INTERNAL_ID" != "null" ]; then
                            echo "Task internal ID: $TASK_INTERNAL_ID"
                            break
                          fi
                          if [ $i -lt 5 ]; then
                            echo "Waiting for task #$TASK_NUM to be indexed (attempt $i/5)..."
                            sleep 3
                          fi
                        done
                        set -e  # Re-enable exit on error
                        
                        if [ -z "$TASK_INTERNAL_ID" ] || [ "$TASK_INTERNAL_ID" = "null" ]; then
                          echo "⚠️  Could not get internal ID for Task #$TASK_NUM after 5 attempts, skipping relationship"
                        else
                          # Add task as sub-issue of phase using the sub-issues API with internal ID
                          set +e
                          RESULT=$(gh api \
                            --method POST \
                            -H "Accept: application/vnd.github+json" \
                            -H "X-GitHub-Api-Version: 2026-03-10" \
                            /repos/$REPO/issues/$PH_NUM/sub_issues \
                            -F "sub_issue_id=$TASK_INTERNAL_ID" 2>&1)
                          if [ $? -eq 0 ]; then
                            echo "✅ Set parent relationship: Task #$TASK_NUM -> Phase #$PH_NUM"
                          else
                            echo "⚠️  Could not set sub-issue relationship: $RESULT"
                          fi
                          set -e
                        fi
                        
                        # Add to tasklist
                        TASK_LIST+="- [ ] #$TASK_NUM $TK"$'\n'
                      else
                        echo "Task was not created correctly, skipping."
                      fi
                    fi
                  done
                  
                  # Update phase issue with tasklist in body
                  if [ -n "$TASK_LIST" ]; then
                    PHASE_BODY="**Parent Project:** #$PROJECT_ISSUE"$'\n\n'
                    PHASE_BODY+="### Tasks"$'\n'
                    PHASE_BODY+="$TASK_LIST"
                    echo "$PHASE_BODY" | gh issue edit "$PH_NUM" --repo "$REPO" --body-file -
                  fi
                else
                  echo "No standard tasks for phase #$PH_NUM: $PH_NAME"
                fi
              fi
          done < phases_map.txt
          cat phases_map.txt
      - name: Update parent project issue with phase tasklist
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
        run: |
          REPO="${{ steps.prep.outputs.repo }}"
          PARENT="${{ steps.prep.outputs.project_number }}"
          
          # Get current issue body
          CURRENT_BODY=$(gh issue view "$PARENT" --repo "$REPO" --json body --jq .body)
          
          # Build phase tasklist
          PHASE_LIST="### Project Phases"$'\n'
          while IFS='|' read -r PH_NAME PH_NUM PH_ITEM_ID PH_NODE_ID; do
            if [ -n "$PH_NAME" ] && [ -n "$PH_NUM" ]; then
              PHASE_LIST+="- [ ] #$PH_NUM - $PH_NAME"$'\n'
            fi
          done < phases_map.txt
          
          # Append phase list to existing body
          NEW_BODY="$CURRENT_BODY"$'\n\n'"$PHASE_LIST"
          
          echo "$NEW_BODY" | gh issue edit "$PARENT" --repo "$REPO" --body-file -
          echo "Project structure created successfully with parent-child relationships in Project #604!"
